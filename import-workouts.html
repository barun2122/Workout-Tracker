function doImport() {
  const btn = document.getElementById('btn');
  const res = document.getElementById('result');
  btn.disabled = true;
  btn.textContent = 'Importing…';

  // Merge into existing workoutHistory (skip duplicates by id)
  let existing = [];
  try { existing = JSON.parse(localStorage.getItem('workoutHistory') || '[]'); } catch(e) {}
  const existingIds = new Set(existing.map(w => w.id));

  let added = 0;
  for (const w of SEED) {
    if (!existingIds.has(w.id)) {
      existing.push(w);
      added++;
    }
  }

  // Sort by date
  existing.sort((a, b) => a.date.localeCompare(b.date));
  localStorage.setItem('workoutHistory', JSON.stringify(existing));

  // Trigger sync if available
  if (typeof syncModule !== 'undefined') syncModule.push('workoutHistory');

  btn.textContent = 'Done!';
  res.style.display = 'block';
  if (added > 0) {
    res.innerHTML = `✓ Imported ${added} workouts. <a href="/" style="color:#222;font-weight:700">Open App →</a>`;
  } else {
    res.className = 'result warn';
    res.innerHTML = 'All workouts already imported. <a href="/" style="color:#222;font-weight:700">Open App →</a>';
  }
}
</script>
