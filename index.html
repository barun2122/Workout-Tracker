<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workout Tracker</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>
    <div class="app-container">
        <!-- Home Screen -->
        <section id="home-screen" class="screen active">
            <header class="screen-header home-header">
                <div class="home-header-text">
                    <h1>Workout</h1>
                    <span class="date" id="today-date"></span>
                </div>
            </header>
            
            <div class="quick-start">
                <button class="start-workout-btn" id="start-workout-btn">
                    <span class="icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"/><path d="M20.4 14.5a3.5 3.5 0 0 0-4.9-4.9 3.5 3.5 0 0 0-4.9 4.9 3.5 3.5 0 0 0 4.9 4.9 3.5 3.5 0 0 0 0-7Z"/><path d="M16 9V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v4"/><line x1="2" x2="22" y1="22" y2="12"/></svg>
                    </span>
                    <span>Start Workout</span>
                </button>
            </div>
            
            <div class="stats-row">
                <div class="stat-item">
                    <span class="stat-value" id="home-total">0</span>
                    <span class="stat-label">Workouts</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value" id="home-streak">0</span>
                    <span class="stat-label">Streak</span>
                </div>
            </div>
            
            <div class="section">
                <h2>Last Workout</h2>
                <div id="last-workout" class="last-workout-card empty">
                    <p>No workouts yet</p>
                </div>
            </div>
            
            <div class="section">
                <h2>Body Parts Status</h2>
                <div class="body-parts-grid" id="body-parts-status"></div>
            </div>
        </section>

        <!-- Workout Screen -->
        <section id="workout-screen" class="screen">
            <header class="screen-header">
                <button class="back-btn" id="back-to-home">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <h1>Workout</h1>
                <button class="done-btn" id="finish-workout-btn">Done</button>
            </header>

            <div class="workout-summary" id="workout-summary">
                <div class="workout-summary-top">
                    <div class="body-parts-display" id="active-body-parts"></div>
                    <span class="workout-timer" id="workout-timer">00:00</span>
                </div>
            </div>
            
            <div class="exercise-selector">
                <div class="body-part-tabs" id="workout-body-part-tabs"></div>
                <div class="exercise-list" id="workout-exercise-list"></div>
            </div>
            
            <div class="current-exercises" id="current-exercises">
                <h3>Today's Exercises</h3>
                <div id="active-exercises-list"></div>
                <div id="empty-exercises" class="empty-state">
                    <p>Add exercises from above</p>
                </div>
            </div>
        </section>

        <!-- Exercise Detail Screen -->
        <section id="exercise-screen" class="screen">
            <header class="screen-header">
                <button class="back-btn" id="back-to-workout">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <h1 id="exercise-detail-title">Exercise</h1>
                <button class="add-set-btn" id="add-set-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
                    Set
                </button>
            </header>

            <div class="exercise-header">
                <span class="body-part-badge" id="exercise-body-part"></span>
            </div>

            <div id="prev-session-card" class="prev-session-card" style="display:none"></div>

            <div class="sets-table-container">
                <table class="sets-table" id="exercise-sets-table">
                    <thead id="sets-table-head">
                        <tr>
                            <th>Set</th>
                            <th>Weight (kg)</th>
                            <th>Reps</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="sets-tbody"></tbody>
                </table>
            </div>

            <div class="set-summary" id="set-summary">
                <span id="total-sets">0 sets</span>
                <span id="total-volume">0 kg volume</span>
            </div>

            <div id="video-link-section" class="video-link-section"></div>
        </section>

        <!-- History Screen -->
        <section id="history-screen" class="screen">
            <header class="screen-header">
                <button class="back-btn" id="back-home-from-history">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <h1>History</h1>
            </header>
            
            <div class="history-list" id="history-list"></div>
        </section>

        <!-- Progress Screen -->
        <section id="progress-screen" class="screen">
            <header class="screen-header">
                <button class="back-btn" id="back-home-from-progress">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <h1>Progress</h1>
            </header>
            
            <div class="exercise-picker" id="exercise-picker"></div>
            <div class="progress-content" id="progress-content"></div>
        </section>

        <!-- Exercises Library Screen -->
        <section id="library-screen" class="screen">
            <header class="screen-header">
                <button class="back-btn" id="back-home-from-library">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <h1>Exercises</h1>
                <button class="add-btn" id="add-exercise-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
                </button>
            </header>
            
            <div class="body-part-tabs" id="library-body-part-tabs"></div>
            <div class="exercise-list" id="library-exercise-list"></div>
        </section>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav" id="bottom-nav">
            <button class="nav-item active" data-screen="home-screen">
                <span class="nav-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
                </span>
                <span>Home</span>
            </button>
            <button class="nav-item" data-screen="history-screen">
                <span class="nav-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                </span>
                <span>History</span>
            </button>
            <button class="nav-item" data-screen="progress-screen">
                <span class="nav-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="20" y2="10"/><line x1="18" x2="18" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="16"/></svg>
                </span>
                <span>Progress</span>
            </button>
            <button class="nav-item" data-screen="library-screen">
                <span class="nav-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
                </span>
                <span>Exercises</span>
            </button>
        </nav>
    </div>

    <!-- Workout Start Modal -->
    <div id="workout-start-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Start Workout</h3>
            <p class="modal-subtext">Select muscles to train today</p>
            <div id="start-bp-chips" class="bp-chips-container"></div>
            <div id="start-suggestion-section" class="start-suggestion-section" style="display:none">
                <span id="start-suggestion-label" class="start-suggestion-label"></span>
                <div id="start-suggestion-list" class="start-suggestion-list"></div>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" id="cancel-start-modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="confirm-start-modal">Start</button>
            </div>
        </div>
    </div>

    <!-- PR Toast -->
    <div id="pr-toast" class="pr-toast hidden">
        <span class="pr-toast-trophy">🏆</span>
        <div class="pr-toast-text">
            <span class="pr-toast-title">New PR!</span>
            <span id="pr-toast-detail" class="pr-toast-detail"></span>
        </div>
    </div>

    <!-- Add Exercise Modal -->
    <div id="add-exercise-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Add Exercise</h3>
            <form id="new-exercise-form">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="exercise-name" required>
                </div>
                <div class="form-group">
                    <label>Body Part</label>
                    <select id="exercise-body-part-select"></select>
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select id="exercise-type-select">
                        <option value="strength">Strength — Weight + Reps</option>
                        <option value="cardio">Cardio — Duration + Distance</option>
                        <option value="bodyweight">Bodyweight — Reps only</option>
                        <option value="duration">Duration — Time only</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancel-add-exercise">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add</button>
                </div>
            </form>
        </div>
    </div>

    <script src="scripts/app.js"></script>
</body>
</html>
