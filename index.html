<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">🏋️</span>
                <h2>Workout Tracker</h2>
            </div>
            <nav class="nav-menu">
                <button class="nav-btn active" data-view="dashboard">
                    <span>📊</span> Dashboard
                </button>
                <button class="nav-btn" data-view="workout">
                    <span>💪</span> Workout
                </button>
                <button class="nav-btn" data-view="exercises">
                    <span>📚</span> Exercises
                </button>
                <button class="nav-btn" data-view="history">
                    <span>📅</span> History
                </button>
                <button class="nav-btn" data-view="progress">
                    <span>📈</span> Progress
                </button>
            </nav>
        </aside>

        <main class="main-content">
            <!-- Dashboard View -->
            <section id="dashboard-view" class="view active">
                <h1>Dashboard</h1>
                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-icon">📅</span>
                        <div class="stat-info">
                            <span class="stat-value" id="total-workouts">0</span>
                            <span class="stat-label">Total Workouts</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <span class="stat-icon">🔥</span>
                        <div class="stat-info">
                            <span class="stat-value" id="current-streak">0</span>
                            <span class="stat-label">Day Streak</span>
                        </div>
                    </div>
                    <div class="stat-card streak-detail">
                        <span class="stat-icon">🎯</span>
                        <div class="stat-info">
                            <span class="stat-label">Today Trained</span>
                            <div class="body-parts-icons" id="today-trained"></div>
                        </div>
                    </div>
                </div>
                <div class="dashboard-section">
                    <h3>Weekly Activity</h3>
                    <div class="weekly-chart" id="weekly-chart"></div>
                </div>
                <div class="dashboard-section">
                    <h3>Last Trained - Body Parts</h3>
                    <div class="body-parts-last-trained" id="body-parts-last-trained"></div>
                </div>
            </section>

            <!-- Workout View -->
            <section id="workout-view" class="view">
                <h1>Start Workout</h1>
                <div class="workout-builder">
                    <div class="workout-header">
                        <input type="date" id="workout-date">
                        <div class="workout-actions">
                            <button class="btn btn-secondary" id="new-workout">New Workout</button>
                            <button class="btn btn-primary" id="finish-workout" disabled>Finish Workout</button>
                        </div>
                    </div>
                    
                    <div id="no-workout" class="empty-state">
                        <span>🏃</span>
                        <p>Click "New Workout" to start tracking</p>
                    </div>
                    
                    <div id="active-workout" class="active-workout hidden">
                        <div class="workout-summary">
                            <span id="workout-date-display"></span>
                            <span id="workout-body-parts"></span>
                        </div>
                        
                        <div class="quick-add-section">
                            <div class="body-part-tabs" id="quick-add-tabs"></div>
                            <div class="quick-add-exercises" id="quick-add-exercises"></div>
                        </div>
                        
                        <div class="current-workout-exercises">
                            <h3>Exercises</h3>
                            <div id="workout-log"></div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Exercises View -->
            <section id="exercises-view" class="view">
                <h1>Exercise Library</h1>
                <div class="exercises-header">
                    <div class="body-part-tabs" id="exercise-body-part-tabs"></div>
                    <button class="btn btn-primary" id="add-exercise-btn">+ Add Exercise</button>
                </div>
                <div class="exercise-list" id="exercise-list"></div>
            </section>

            <!-- History View -->
            <section id="history-view" class="view">
                <h1>Workout History</h1>
                <div class="history-list" id="history-list"></div>
            </section>

            <!-- Progress View -->
            <section id="progress-view" class="view">
                <h1>Progress</h1>
                <div class="progress-selector">
                    <label>Select Exercise:</label>
                    <select id="progress-exercise-select"></select>
                </div>
                <div class="progress-content" id="progress-content"></div>
            </section>
        </main>
    </div>

    <!-- Add Exercise Modal -->
    <div id="exercise-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Add New Exercise</h3>
            <form id="exercise-form">
                <div class="form-group">
                    <label>Exercise Name</label>
                    <input type="text" id="new-exercise-name" required>
                </div>
                <div class="form-group">
                    <label>Body Part</label>
                    <select id="new-exercise-body-part" required></select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancel-exercise">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Exercise</button>
                </div>
            </form>
        </div>
    </div>

    <script src="scripts/app.js"></script>
</body>
</html>
